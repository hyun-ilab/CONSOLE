<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CONSOLE</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #101820;
      background: #f7f3ea;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100% - 36px));
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 7vw, 64px);
      letter-spacing: 0;
    }

    p {
      max-width: 560px;
      margin: 0 0 24px;
      font-size: 18px;
      line-height: 1.6;
    }

    nav {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid #222;
      border-radius: 6px;
      color: inherit;
      text-decoration: none;
      background: #fffdf8;
      box-shadow: 4px 4px 0 #222;
    }

    a:hover,
    a:focus-visible {
      background: #d8f0ff;
      outline: none;
    }

    strong,
    span {
      display: block;
    }

    strong {
      font-size: 17px;
      margin-bottom: 4px;
    }

    span {
      color: #4d5965;
      font-size: 14px;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>CONSOLE</h1>
    <p>Public workspace for CONSOLE language and tone prototypes.</p>
    <nav aria-label="Primary links">
      <a href="./40_deployments/netlify_console_demo/">
        <strong>Open Console14 prototype</strong>
        <span>hyun-ilab.github.io/CONSOLE/40_deployments/netlify_console_demo/</span>
      </a>
      <a href="https://github.com/hyun-ilab/CONSOLE/blob/codex/console14-task-decisions/10_projects/console14/prototype_resonance.html">
        <strong>View Console14 resonance build on GitHub</strong>
        <span>github.com/hyun-ilab/CONSOLE/.../prototype_resonance.html</span>
      </a>
    </nav>
  </main>
</body>
</html>
